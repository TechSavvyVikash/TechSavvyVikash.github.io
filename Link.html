<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
</head>
<body style="background:black; color:white; text-align:center;">

<p>Redirecting...</p>

<script>
fetch("https://raw.githubusercontent.com/TechSavvyVikash/AF-Link_Control/refs/heads/main/Link.json?t=" + Date.now())
  .then(res => res.json())
  .then(data => {
    window.location.href = data.magic_button;
  })
  .catch(() => {
    document.body.innerHTML = "Error loading link";
  });
</script>

</body>
</html>
