<!DOCTYPE html>
<html>
<body>

<script>
fetch("https://raw.githubusercontent.com/TechSavvyVikash/AF-Link_Control/main/Link.json" + Date.now())
  .then(res => res.json())
  .then(data => {
    window.location.href = data.magic_button;
  })
  .catch(() => {
    document.body.innerHTML = "Error loading link";
  });
</script>

</body>
</html>
